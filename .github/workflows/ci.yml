name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Start app and run mobile smoke checks
        env:
          MOBILE_SMOKE_BASE_URL: http://localhost:3000
        run: |
          npm run start > /tmp/next-start.log 2>&1 &
          APP_PID=$!
          trap "kill $APP_PID" EXIT
          for i in {1..30}; do
            if curl -sf "$MOBILE_SMOKE_BASE_URL" > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf "$MOBILE_SMOKE_BASE_URL" > /dev/null
          npm run qa:mobile-smoke
